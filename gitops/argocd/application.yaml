apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-copilot
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: devops-copilot
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/karthikk022/devops-copilot.git
    targetRevision: HEAD
    path: helm/devops-copilot
    helm:
      releaseName: devops-copilot
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-copilot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
