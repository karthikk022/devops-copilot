name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: copilot-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: copilot-backend/requirements.txt
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot
          POSTGRES_DB: copilot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U copilot"
          --health-interval 5s --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: copilot-backend
    env:
      DATABASE_URL: postgresql://copilot:copilot@localhost:5432/copilot
      OPENROUTER_API_KEY: sk-or-v1-test-placeholder-not-real
      RUNBOOKS_DIR: ../runbooks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: copilot-backend/requirements.txt
      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Smoke import
        run: python -c "from app.main import app; print('imports OK')"

  lint-frontend:
    name: Lint frontend (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npx next lint --max-warnings 0

  typecheck-frontend:
    name: Typecheck frontend (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build-frontend:
    name: Build frontend (next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  dockerfile-lint:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: copilot-backend/Dockerfile
          failure-threshold: error
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/frontend/Dockerfile
          failure-threshold: error

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
