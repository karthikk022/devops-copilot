apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-copilot.fullname" . }}-openrouter
  labels:
    {{- include "devops-copilot.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.openrouter.apiKeyExistingSecret }}
  OPENROUTER_API_KEY: ""  # value injected from existing secret via envFrom below
  {{- else }}
  OPENROUTER_API_KEY: {{ .Values.openrouter.apiKey | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  {{- end }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-copilot.fullname" . }}-postgres
  labels:
    {{- include "devops-copilot.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgres.auth.existingSecret }}
  {{- else }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | b64enc | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | b64enc | quote }}
  {{- end }}
{{- end }}
