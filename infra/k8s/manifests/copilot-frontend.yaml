apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-frontend
  namespace: devops-copilot
  labels:
    app: copilot-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: copilot-frontend
  template:
    metadata:
      labels:
        app: copilot-frontend
    spec:
      containers:
        - name: frontend
          image: copilot-frontend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://copilot-backend.devops-copilot.svc.cluster.local"
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: copilot-frontend
  namespace: devops-copilot
spec:
  type: ClusterIP
  selector:
    app: copilot-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: copilot-frontend
  namespace: devops-copilot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: copilot-frontend
                port:
                  number: 80
