{{- if .Values.postgres.enabled }}
{{- if .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "devops-copilot.fullname" . }}-postgres-data
  labels:
    {{- include "devops-copilot.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.postgres.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size | quote }}
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-copilot.fullname" . }}-postgres
  labels:
    {{- include "devops-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "devops-copilot.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-copilot.labels" . | nindent 8 }}
        {{- include "devops-copilot.postgres.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            {{- if .Values.postgres.auth.existingSecret }}
            - secretRef:
                name: {{ .Values.postgres.auth.existingSecret }}
            {{- else }}
            - secretRef:
                name: {{ include "devops-copilot.fullname" . }}-postgres
            {{- end }}
          {{- if not .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          {{- end }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.auth.username | quote }}, "-d", {{ .Values.postgres.auth.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.auth.username | quote }}, "-d", {{ .Values.postgres.auth.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 15
          securityContext:
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      {{- if not .Values.postgres.persistence.enabled }}
      volumes:
        - name: init
          configMap:
            name: {{ include "devops-copilot.fullname" . }}-postgres-init
      {{- else }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "devops-copilot.fullname" . }}-postgres-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-copilot.fullname" . }}-postgres
  labels:
    {{- include "devops-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: {{ .Values.postgres.service.type }}
  selector:
    {{- include "devops-copilot.postgres.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: 5432
{{- end }}
