config:
  serverPort: 3101
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - cri: {}
      - labelmap:
          action: keep
          regex: __meta_kubernetes_pod_label_(.+)
      - labeldrop:
        - filename
      - regex:
          expression: '(?P<level>\w+)\s+(?P<rest>.*)'
          source: line
      - labels:
          level:

daemonset:
  enabled: true
  hostAliases:
    - hostnames:
        - localhost
      ip: 127.0.0.1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
