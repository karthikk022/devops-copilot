name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./copilot-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/copilot-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/copilot-backend:latest
          platforms: linux/amd64,linux/arm64

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/copilot-frontend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/copilot-frontend:latest
          build-args: NEXT_PUBLIC_API_URL=http://copilot-backend.devops-copilot.svc.cluster.local
          platforms: linux/amd64,linux/arm64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            LICENSE
