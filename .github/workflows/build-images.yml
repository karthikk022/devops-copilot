name: build-images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
    paths:
      - "copilot-backend/**"
      - "apps/frontend/**"
      - ".github/workflows/build-images.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  backend:
    name: Build & push copilot-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/copilot-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./copilot-backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-v2
          cache-to: type=gha,mode=max,scope=backend-v2
          platforms: linux/amd64,linux/arm64

  frontend:
    name: Build & push copilot-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/copilot-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://copilot-backend.devops-copilot.svc.cluster.local
          cache-from: type=gha,scope=frontend-v2
          cache-to: type=gha,mode=max,scope=frontend-v2
          platforms: linux/amd64,linux/arm64

  update-manifests:
    name: Update K8s manifests with new image tags
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend image
        run: |
          BACKEND_TAG=$(echo "$BACKEND_IMAGE" | grep "sha-" | head -1)
          if [ -z "$BACKEND_TAG" ]; then
            echo "No sha-* tag found in BACKEND_IMAGE, skipping"
            exit 0
          fi
          sed -i "s|ghcr.io/.*/copilot-backend:.*|${BACKEND_TAG}|" \
            helm/devops-copilot/values.yaml
          echo "Backend image set to: $BACKEND_TAG"
        env:
          BACKEND_IMAGE: ${{ needs.backend.outputs.tag }}

      - name: Update frontend image
        run: |
          FRONTEND_TAG=$(echo "$FRONTEND_IMAGE" | grep "sha-" | head -1)
          if [ -z "$FRONTEND_TAG" ]; then
            echo "No sha-* tag found in FRONTEND_IMAGE, skipping"
            exit 0
          fi
          sed -i "s|ghcr.io/.*/copilot-frontend:.*|${FRONTEND_TAG}|" \
            helm/devops-copilot/values.yaml
          echo "Frontend image set to: $FRONTEND_TAG"
        env:
          FRONTEND_IMAGE: ${{ needs.frontend.outputs.tag }}

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(images): bump to ${{ github.sha }}"
          commit-message: "chore(images): bump to ${{ github.sha }}"
          branch: chore/bump-images-${{ github.sha }}
          delete-branch: true
