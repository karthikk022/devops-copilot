name: Renovate

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.14
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          GITHUB_COMMENT_TYPE: "pr-body"
        with:
          configurationFile: .github/renovate.json
