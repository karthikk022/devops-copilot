name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Filesystem scan (trivy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install trivy CLI
        continue-on-error: true
        run: |
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.65.0/trivy_0.65.0_Linux-64bit.tar.gz | tar -xz
          sudo mv trivy /usr/local/bin/
          trivy --version
      - name: Run Trivy filesystem scan
        continue-on-error: true
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-fs.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif

  trivy-backend:
    name: Image scan — backend (trivy)
    runs-on: ubuntu-latest
    needs: [gitleaks]
    continue-on-error: true
    container:
      image: docker:dind
      options: --privileged
    steps:
      - name: Install bash, curl, trivy
        continue-on-error: true
        run: |
          apk add --no-cache bash curl
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.65.0/trivy_0.65.0_Linux-64bit.tar.gz | tar -xz -C /usr/local/bin trivy
          trivy --version
      - uses: actions/checkout@v4
      - name: Build backend image
        continue-on-error: true
        run: docker build -t copilot-backend:test ./copilot-backend
      - name: Scan backend image
        continue-on-error: true
        run: |
          trivy image copilot-backend:test \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

  trivy-frontend:
    name: Image scan — frontend (trivy)
    runs-on: ubuntu-latest
    needs: [gitleaks]
    continue-on-error: true
    container:
      image: docker:dind
      options: --privileged
    steps:
      - name: Install bash, curl, trivy
        continue-on-error: true
        run: |
          apk add --no-cache bash curl
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.65.0/trivy_0.65.0_Linux-64bit.tar.gz | tar -xz -C /usr/local/bin trivy
          trivy --version
      - uses: actions/checkout@v4
      - name: Build frontend image
        continue-on-error: true
        run: docker build -t copilot-frontend:test ./apps/frontend
      - name: Scan frontend image
        continue-on-error: true
        run: |
          trivy image copilot-frontend:test \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
