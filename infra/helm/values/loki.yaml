loki:
  commonConfig:
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

limits_config:
  retention_period: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  allow_structured_metadata: true

compactor:
  working_directory: /data/compactor
  retention_enabled: true
  delete_request_store: filesystem

queryRange:
  resultsCache:
    cache:
      embeddedCache:
        enabled: true
        maxSizeMemory: 100MB

ruler:
  storage:
    type: local
    local:
      directory: /data/rules

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

gateway:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
